<svg viewBox="0 0 900 200" xmlns="http://www.w3.org/2000/svg" width="900" height="200">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#000000"/>
      <stop offset="50%" style="stop-color:#0d0d1a"/>
      <stop offset="100%" style="stop-color:#0f1e3a"/>
    </linearGradient>

    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffe066"/>
      <stop offset="50%" style="stop-color:#e0c050"/>
      <stop offset="100%" style="stop-color:#b8922a"/>
    </linearGradient>

    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e0c050;stop-opacity:0"/>
      <stop offset="30%" style="stop-color:#e0c050;stop-opacity:1"/>
      <stop offset="70%" style="stop-color:#e0c050;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#e0c050;stop-opacity:0"/>
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="softGlow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="subtleGlow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <radialGradient id="spotlight" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#1a2a4a;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#000000;stop-opacity:0"/>
    </radialGradient>

    <mask id="fadeMask">
      <linearGradient id="fadeLR" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%" style="stop-color:white;stop-opacity:0"/>
        <stop offset="10%" style="stop-color:white;stop-opacity:1"/>
        <stop offset="90%" style="stop-color:white;stop-opacity:1"/>
        <stop offset="100%" style="stop-color:white;stop-opacity:0"/>
      </linearGradient>
      <rect width="900" height="200" fill="url(#fadeLR)"/>
    </mask>
  </defs>

  <!-- Background -->
  <rect width="900" height="200" fill="url(#bgGrad)"/>

  <!-- Spotlight overlay -->
  <ellipse cx="450" cy="100" rx="420" ry="160" fill="url(#spotlight)"/>

  <!-- Animated grid lines - vertical -->
  <g opacity="0.06" mask="url(#fadeMask)">
    <line x1="90" y1="0" x2="90" y2="200" stroke="#e0c050" stroke-width="0.5"/>
    <line x1="180" y1="0" x2="180" y2="200" stroke="#e0c050" stroke-width="0.5"/>
    <line x1="270" y1="0" x2="270" y2="200" stroke="#e0c050" stroke-width="0.5"/>
    <line x1="360" y1="0" x2="360" y2="200" stroke="#e0c050" stroke-width="0.5"/>
    <line x1="450" y1="0" x2="450" y2="200" stroke="#e0c050" stroke-width="0.5"/>
    <line x1="540" y1="0" x2="540" y2="200" stroke="#e0c050" stroke-width="0.5"/>
    <line x1="630" y1="0" x2="630" y2="200" stroke="#e0c050" stroke-width="0.5"/>
    <line x1="720" y1="0" x2="720" y2="200" stroke="#e0c050" stroke-width="0.5"/>
    <line x1="810" y1="0" x2="810" y2="200" stroke="#e0c050" stroke-width="0.5"/>
  </g>

  <!-- Animated grid lines - horizontal -->
  <g opacity="0.06" mask="url(#fadeMask)">
    <line x1="0" y1="40" x2="900" y2="40" stroke="#e0c050" stroke-width="0.5"/>
    <line x1="0" y1="80" x2="900" y2="80" stroke="#e0c050" stroke-width="0.5"/>
    <line x1="0" y1="120" x2="900" y2="120" stroke="#e0c050" stroke-width="0.5"/>
    <line x1="0" y1="160" x2="900" y2="160" stroke="#e0c050" stroke-width="0.5"/>
  </g>

  <!-- Animated scanning line -->
  <rect x="0" y="0" width="900" height="2" fill="url(#lineGrad)" opacity="0.5">
    <animateTransform attributeName="transform" type="translate" values="0,0;0,198;0,0" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.7;0.7;0" keyTimes="0;0.1;0.9;1" dur="4s" repeatCount="indefinite"/>
  </rect>

  <!-- Floating particles -->
  <circle cx="80" cy="40" r="1.5" fill="#e0c050" opacity="0">
    <animate attributeName="opacity" values="0;0.8;0" dur="3s" begin="0s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="40;20;40" dur="3s" begin="0s" repeatCount="indefinite"/>
  </circle>
  <circle cx="820" cy="160" r="1" fill="#e0c050" opacity="0">
    <animate attributeName="opacity" values="0;0.6;0" dur="4s" begin="1s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="160;140;160" dur="4s" begin="1s" repeatCount="indefinite"/>
  </circle>
  <circle cx="200" cy="170" r="1.2" fill="#e0c050" opacity="0">
    <animate attributeName="opacity" values="0;0.5;0" dur="3.5s" begin="0.5s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="170;155;170" dur="3.5s" begin="0.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="700" cy="30" r="1" fill="#e0c050" opacity="0">
    <animate attributeName="opacity" values="0;0.7;0" dur="2.8s" begin="1.5s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="30;15;30" dur="2.8s" begin="1.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="500" cy="180" r="1.5" fill="#e0c050" opacity="0">
    <animate attributeName="opacity" values="0;0.4;0" dur="5s" begin="2s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="180;165;180" dur="5s" begin="2s" repeatCount="indefinite"/>
  </circle>

  <!-- Corner brackets - top left -->
  <g filter="url(#subtleGlow)">
    <line x1="20" y1="20" x2="60" y2="20" stroke="#e0c050" stroke-width="1.5" opacity="0.7"/>
    <line x1="20" y1="20" x2="20" y2="60" stroke="#e0c050" stroke-width="1.5" opacity="0.7"/>
    <!-- top right -->
    <line x1="880" y1="20" x2="840" y2="20" stroke="#e0c050" stroke-width="1.5" opacity="0.7"/>
    <line x1="880" y1="20" x2="880" y2="60" stroke="#e0c050" stroke-width="1.5" opacity="0.7"/>
    <!-- bottom left -->
    <line x1="20" y1="180" x2="60" y2="180" stroke="#e0c050" stroke-width="1.5" opacity="0.7"/>
    <line x1="20" y1="180" x2="20" y2="140" stroke="#e0c050" stroke-width="1.5" opacity="0.7"/>
    <!-- bottom right -->
    <line x1="880" y1="180" x2="840" y2="180" stroke="#e0c050" stroke-width="1.5" opacity="0.7"/>
    <line x1="880" y1="180" x2="880" y2="140" stroke="#e0c050" stroke-width="1.5" opacity="0.7"/>
  </g>

  <!-- Gold accent bar top -->
  <rect x="0" y="0" width="900" height="3" fill="url(#lineGrad)" opacity="0.9"/>
  <!-- Gold accent bar bottom -->
  <rect x="0" y="197" width="900" height="3" fill="url(#lineGrad)" opacity="0.9"/>

  <!-- Main name text with glow - animates in -->
  <text
    x="450" y="105"
    text-anchor="middle"
    font-family="'Arial Black', 'Helvetica Neue', sans-serif"
    font-weight="900"
    font-size="64"
    letter-spacing="6"
    fill="url(#goldGrad)"
    filter="url(#softGlow)"
  >
    BASIL JOSEPH
    <animate attributeName="opacity" values="0;0;1" keyTimes="0;0.3;1" dur="1.5s" fill="freeze"/>
  </text>

  <!-- Subtitle text -->
  <text
    x="450" y="140"
    text-anchor="middle"
    font-family="'Courier New', Courier, monospace"
    font-weight="400"
    font-size="15"
    letter-spacing="5"
    fill="#aaaaaa"
  >
    APP DEVELOPER  ·  FULL-STACK ENGINEER
    <animate attributeName="opacity" values="0;0;1" keyTimes="0;0.5;1" dur="2s" fill="freeze"/>
  </text>

  <!-- Decorative thin lines flanking subtitle -->
  <line x1="100" y1="140" x2="230" y2="140" stroke="#e0c050" stroke-width="0.5" opacity="0.4">
    <animate attributeName="opacity" values="0;0.4" dur="2.5s" fill="freeze"/>
  </line>
  <line x1="670" y1="140" x2="800" y2="140" stroke="#e0c050" stroke-width="0.5" opacity="0.4">
    <animate attributeName="opacity" values="0;0.4" dur="2.5s" fill="freeze"/>
  </line>

  <!-- Pulsing dot left -->
  <circle cx="232" cy="140" r="3" fill="#e0c050" opacity="0.6">
    <animate attributeName="opacity" values="0.6;0.1;0.6" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="r" values="3;4;3" dur="2s" repeatCount="indefinite"/>
  </circle>
  <!-- Pulsing dot right -->
  <circle cx="668" cy="140" r="3" fill="#e0c050" opacity="0.6">
    <animate attributeName="opacity" values="0.6;0.1;0.6" dur="2s" begin="1s" repeatCount="indefinite"/>
    <animate attributeName="r" values="3;4;3" dur="2s" begin="1s" repeatCount="indefinite"/>
  </circle>
</svg>
